name: Daily Root Certs Update Check

on:
  schedule:
    - cron: "0 0 * * *" # Runs at 00:00 UTC every day
  workflow_dispatch: # Allows manual trigger

jobs:
  check-and-update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@f4d14e03ff726c06358e5557344e1da148b56cf7 # v1
        with:
          bun-version: latest

      - name: Generate root certs and capture output
        id: generate-certs
        run: |
          cd packages/bun-usockets/
          CERT_METADATA=$(mktemp)
          bun generate-root-certs.mjs -v -f "$CERT_METADATA"
          cat "$CERT_METADATA" >> "$GITHUB_ENV"

      - name: Check for changes and stage files
        id: check-changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "Found changes, staging modified files..."
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            
            # Get list of modified files and add them
            git status --porcelain | while read -r _ file; do
              # Remove leading status and whitespace
              file=${file##* }
              echo "Adding changed file: $file"
              git add "$file"
            done
            
            echo "changes=true" >> "$GITHUB_OUTPUT"
            
            # Store the list of changed files
            CHANGED_FILES=$(git status --porcelain)
            {
              echo "changed_files<<EOF"
              echo "$CHANGED_FILES"
              echo "EOF"
            } >> "$GITHUB_ENV"
          else
            echo "No changes detected"
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Pull Request
        if: steps.check-changes.outputs.changes == 'true'
        uses: peter-evans/create-pull-request@4e1beaa7521e8b457b572c090b25bd3db56bf1c5 # v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: ${{ env.COMMIT_MSG }}
          title: "crypto: update root certificates to NSS ${{ env.NEW_VERSION }}"
          body: |
            Updates Bun's bundled root certificate store to NSS ${{ env.NEW_VERSION }}.

            ${{ env.COMMIT_MSG }}

            ## Changed files

            ```text
            ${{ env.changed_files }}
            ```
          branch: certs/update-root-certs
          base: main
          delete-branch: true
          labels: |
            automation
            root-certs
